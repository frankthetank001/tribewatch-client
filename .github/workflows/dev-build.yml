name: Dev Build

on:
  push:
    branches: [dev]

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          pip install -e .
          pip install pyinstaller

      - name: Generate dev version
        id: version
        shell: bash
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          VERSION="dev-${SHORT_SHA}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          sed -i "s/__version__ = .*/__version__ = \"${VERSION}\"/" tribewatch/__init__.py

      - name: Install Inno Setup
        shell: pwsh
        run: |
          choco install innosetup -y --no-progress
          echo "C:\Program Files (x86)\Inno Setup 6" | Out-File -Append -Encoding utf8 $env:GITHUB_PATH

      - name: Build exe and installer
        run: python build.py --installer --iss installer-dev.iss

      - name: Create ZIP archive of portable build
        shell: pwsh
        run: Compress-Archive -Path dist\TribeWatch\* -DestinationPath dist\TribeWatch-${{ steps.version.outputs.version }}-portable.zip

      - name: Create or update dev pre-release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: dev-latest
          name: "Dev Build (${{ steps.version.outputs.version }})"
          body: |
            Automated dev build from `dev` branch.

            **Commit:** ${{ github.sha }}
            **Version:** `${{ steps.version.outputs.version }}`

            This pre-release is updated on every push to dev.
          prerelease: true
          make_latest: false
          files: |
            dist/TribeWatch-Dev-Setup.exe
            dist/TribeWatch-${{ steps.version.outputs.version }}-portable.zip
