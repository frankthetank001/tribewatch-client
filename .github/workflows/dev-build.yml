name: Dev Build

on:
  push:
    branches: [dev]

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          pip install -e .
          pip install pyinstaller

      - name: Generate dev version
        id: version
        shell: bash
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          VERSION="dev-${SHORT_SHA}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          sed -i "s/__version__ = .*/__version__ = \"${VERSION}\"/" tribewatch/__init__.py

      - name: Install Inno Setup
        shell: pwsh
        run: |
          choco install innosetup -y --no-progress
          echo "C:\Program Files (x86)\Inno Setup 6" | Out-File -Append -Encoding utf8 $env:GITHUB_PATH

      - name: Build exe and installer
        run: python build.py --installer --iss installer-dev.iss

      - name: Create or update dev pre-release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          tag_name: dev-latest
          name: "Dev Build (${{ steps.version.outputs.version }})"
          body: |
            Automated dev build from `dev` branch.

            **Commit:** ${{ github.sha }}
            **Version:** `${{ steps.version.outputs.version }}`

            This pre-release is updated on every push to dev.
          prerelease: true
          make_latest: false
          files: |
            dist/TribeWatch-Dev-Setup.exe
