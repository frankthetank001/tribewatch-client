name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # Fetch tag OBJECTS, not just refs. Without this, an
          # annotated tag arrives as a lightweight ref pointing at
          # its commit — git tag -l --format='%(contents)' then
          # returns the commit's message instead of the tag's
          # annotation, defeating the user-facing release notes
          # path below.
          fetch-tags: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          pip install -e .
          pip install pyinstaller

      - name: Extract version from tag
        id: version
        shell: bash
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Stamp version from tag into __init__.py
        shell: bash
        run: |
          sed -i "s/__version__ = .*/__version__ = \"${{ steps.version.outputs.version }}\"/" tribewatch/__init__.py

      - name: Install Inno Setup
        shell: pwsh
        run: |
          choco install innosetup -y --no-progress
          echo "C:\Program Files (x86)\Inno Setup 6" | Out-File -Append -Encoding utf8 $env:GITHUB_PATH

      - name: Build exe and installer
        run: python build.py --installer

      - name: Create ZIP archive of portable build
        shell: pwsh
        run: Compress-Archive -Path dist\TribeWatch\* -DestinationPath dist\TribeWatch-${{ steps.version.outputs.version }}-portable.zip

      - name: Build release notes
        shell: bash
        env:
          TAG: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail

          # Prefer the annotated tag's message as the user-facing release
          # body. Falls back to the auto-generated commit list when the
          # tag is lightweight or its message is empty / placeholder.
          # This lets the tagger write a real summary for end users
          # ("Auto-updater now works on machines with old Windows certs")
          # instead of letting raw commit subjects ship to the Discord
          # embed ("fix: route all aiohttp HTTPS through certifi-backed
          # SSL context").
          TAG_MSG=$(git tag -l --format='%(contents)' "${TAG}" | sed -e 's/[[:space:]]*$//')
          # Strip a leading PGP signature block if the tag was signed.
          TAG_MSG=$(printf '%s' "${TAG_MSG}" | awk '/^-----BEGIN PGP SIGNATURE-----$/{exit} {print}')
          # Treat a message that's just the tag name (default for
          # lightweight tags) as empty.
          if [ "${TAG_MSG}" = "${TAG}" ] || [ -z "${TAG_MSG}" ]; then
            TAG_MSG=""
          fi

          PREV_TAG=$(git tag --sort=-v:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | grep -v "^${TAG}$" | head -1 || true)
          if [ -n "${PREV_TAG}" ]; then
            RANGE="${PREV_TAG}..${TAG}"
            COMPARE="https://github.com/${REPO}/compare/${PREV_TAG}...${TAG}"
          else
            RANGE="${TAG}"
            COMPARE=""
          fi

          if [ -n "${TAG_MSG}" ]; then
            # Hand-written tag message wins. Append a "Full changelog"
            # link at the bottom for anyone who wants the raw commits.
            {
              printf '%s\n' "${TAG_MSG}"
              if [ -n "${COMPARE}" ]; then printf '\n---\n**Full changelog**: %s\n' "${COMPARE}"; fi
            } > release-notes.md
          else
            # Fallback: auto-categorised commit list (the original
            # behaviour, kept as a safety net for un-annotated tags).
            fmt() {
              git log --no-merges --pretty=format:'%s' "${RANGE}" \
                | grep -iE "$1" \
                | sed -E 's/^[a-z]+(\([^)]*\))?:[[:space:]]*//' \
                | sed 's/^/- /' || true
            }

            FEATS=$(fmt '^feat(\([^)]*\))?:')
            FIXES=$(fmt '^fix(\([^)]*\))?:')
            OTHER=$(fmt '^(chore|ci|docs|test|refactor|build|perf|style)(\([^)]*\))?:')

            {
              if [ -n "${FEATS}" ]; then printf '### ✨ Features\n%s\n\n' "${FEATS}"; fi
              if [ -n "${FIXES}" ]; then printf '### 🐛 Fixes\n%s\n\n' "${FIXES}"; fi
              if [ -n "${OTHER}" ]; then printf '### 🔧 Other\n%s\n\n' "${OTHER}"; fi
              if [ -n "${COMPARE}" ]; then printf '**Full changelog**: %s\n' "${COMPARE}"; fi
            } > release-notes.md
          fi

          echo "--- release-notes.md ---"
          cat release-notes.md
          echo "--- end ---"

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          body_path: release-notes.md
          files: |
            dist/TribeWatch-Setup.exe
            dist/TribeWatch-${{ steps.version.outputs.version }}-portable.zip

  notify:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Notify Discord
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_RELEASE_WEBHOOK }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
        run: |
          if [ -z "$DISCORD_WEBHOOK" ]; then
            echo "DISCORD_RELEASE_WEBHOOK not set — skipping"
            exit 0
          fi
          sleep 3
          body=$(gh release view "$TAG" --repo "$REPO" --json body --jq .body)
          if [ ${#body} -gt 3800 ]; then
            body=$(printf '%s…\n\n[Read the full release notes](https://github.com/%s/releases/tag/%s)' "${body:0:3800}" "$REPO" "$TAG")
          fi
          jq -nc \
            --arg title "💻  TribeWatch Client $TAG" \
            --arg url "https://github.com/$REPO/releases/tag/$TAG" \
            --arg description "$body" \
            '{embeds:[{title:$title, url:$url, description:$description, color:3447003, footer:{text:"Client release"}, timestamp:(now|todateiso8601)}]}' \
            > payload.json
          curl -fsS -H "Content-Type: application/json; charset=utf-8" \
               --data-binary @payload.json "$DISCORD_WEBHOOK"
